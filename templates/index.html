<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-option {
            flex: 1;
        }

        .radio-option input[type="radio"] {
            display: none;
        }

        .radio-option label {
            display: block;
            padding: 12px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .radio-option input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-text {
            font-size: 1.2rem;
            color: #333;
            font-weight: 600;
            text-align: center;
        }

        .error {
            background: #ffe0e0;
            border-left-color: #ff4444;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #667eea;
        }

        .loader.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Temperature Converter</h1>
        <p class="subtitle">Powered by LangGraph</p>

        <form id="converterForm">
            <div class="form-group">
                <label for="temperature">Enter Temperature:</label>
                <input 
                    type="number" 
                    id="temperature" 
                    name="temperature" 
                    step="0.01" 
                    value="0" 
                    required
                    autocomplete="off"
                >
            </div>

            <div class="form-group">
                <label>Convert From:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="celsius" name="scale" value="C" checked>
                        <label for="celsius">Celsius</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="fahrenheit" name="scale" value="F">
                        <label for="fahrenheit">Fahrenheit</label>
                    </div>
                </div>
            </div>

            <button type="submit">Convert Temperature</button>
        </form>

        <div class="loader" id="loader">Converting...</div>

        <div class="result" id="result">
            <div class="result-text" id="resultText"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('converterForm');
        const result = document.getElementById('result');
        const resultText = document.getElementById('resultText');
        const loader = document.getElementById('loader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const temperature = parseFloat(document.getElementById('temperature').value);
            const scale = document.querySelector('input[name="scale"]:checked').value;

            loader.classList.add('show');
            result.classList.remove('show');

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        temperature: temperature,
                        scale: scale
                    })
                });

                const data = await response.json();
                loader.classList.remove('show');

                if (data.success) {
                    result.classList.remove('error');
                    resultText.textContent = data.result;
                    result.classList.add('show');
                } else {
                    result.classList.add('error');
                    resultText.textContent = 'Error: ' + data.error;
                    result.classList.add('show');
                }
            } catch (error) {
                loader.classList.remove('show');
                result.classList.add('error');
                resultText.textContent = 'Error: Failed to convert temperature';
                result.classList.add('show');
            }
        });
    </script>
</body>
</html>
